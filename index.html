<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Judul peta */
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(90deg, #7a0d0d, #9d1111, #7a0d0d);
            color: #fff;
            text-align: center;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 0.5px;
            padding: 18px 10px;
            box-sizing: border-box;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }

        .map-subtitle {
            font-size: 13px;
            font-weight: normal;
            margin-top: 4px;
            text-transform: none;
            opacity: 0.95;
        }

        /* Box identitas kiri bawah */
        .info-box {
            position: absolute;
            left: 20px;
            bottom: 24px;
            z-index: 1000;
            background: rgba(72, 0, 0, 0.92);
            color: #fff;
            padding: 16px 18px;
            border-radius: 16px;
            min-width: 250px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box b {
            font-size: 15px;
        }

        /* Legend kanan bawah */
        .legend-box {
            position: absolute;
            right: 20px;
            bottom: 24px;
            z-index: 1000;
            background: rgba(72, 0, 0, 0.92);
            color: #fff;
            padding: 16px 18px;
            border-radius: 16px;
            min-width: 185px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            font-size: 13px;
            line-height: 1.6;
        }

        .legend-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .legend-color {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            display: inline-block;
            box-sizing: border-box;
        }

        /* Supaya header tidak menutupi kontrol zoom */
        .leaflet-top.leaflet-left {
            top: 78px;
        }

        /* Popup lebih rapi */
        .leaflet-popup-content {
            font-size: 12px;
            line-height: 1.4;
        }
        </style>
        <title>Peta Kecamatan Paal Dua dan Kelurahan Malendeng</title>
    </head>
    <body>

        <div class="map-header">
            MAP KECAMATAN PAAL DUA, KELURAHAN MALENDENG
            <div class="map-subtitle">Kota Manado, Sulawesi Utara</div>
        </div>

        <div class="info-box">
            <b>Nama:</b> Mananda R. I. Lumbantoruan<br>
            <b>NIM:</b> 241011060011<br>
            <b>Kelas:</b> SI-A
        </div>

        <div class="legend-box">
            <div class="legend-title">Keterangan</div>
            <div class="legend-item">
                <span class="legend-color" style="background: rgba(182,111,180,0.7); border: 2px solid rgba(128,0,128,1.0);"></span>
                Kecamatan Paal Dua
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: rgba(255,182,193,0.7); border: 2px solid rgba(255,105,180,1.0);"></span>
                Kelurahan Malendeng
            </div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1.js"></script>
        <script src="data/MALENDENG_2.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[1.4593840983715045,124.83677710783212],[1.4998099119457062,124.91665851545474]]);

        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        var bounds_group = new L.featureGroup([]);
        function setBounds() {}

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        map.addLayer(layer_GoogleSatellite_0);

        function pop_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2"><b>Kecamatan</b></td></tr>\
                    <tr><td colspan="2">' + (feature.properties['NAMOBJ'] !== null ? autolinker.link(String(feature.properties['NAMOBJ']).replace(/'/g, '\'').toLocaleString()) : 'Kecamatan Paal Dua') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMKC'] !== null ? autolinker.link(String(feature.properties['WADMKC']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMKK'] !== null ? autolinker.link(String(feature.properties['WADMKK']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMPR'] !== null ? autolinker.link(String(feature.properties['WADMPR']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1_0() {
            return {
                pane: 'pane_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1',
                opacity: 1,
                color: 'rgba(128,0,128,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0,
                fill: true,
                fillOpacity: 0.7,
                fillColor: 'rgba(182,111,180,0.7)',
                interactive: true,
            }
        }

        map.createPane('pane_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1');
        map.getPane('pane_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1').style.zIndex = 401;
        map.getPane('pane_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1').style['mix-blend-mode'] = 'normal';

        var layer_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1 = new L.geoJson(json_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1',
            layerName: 'layer_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1',
            pane: 'pane_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1',
            onEachFeature: pop_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1,
            style: style_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1_0,
        });
        bounds_group.addLayer(layer_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1);
        map.addLayer(layer_KOTAMANADOADMINISTRASIKECAMATAN_AR_50Kshp_1);

        function pop_MALENDENG_2(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2"><b>Kelurahan</b></td></tr>\
                    <tr><td colspan="2">' + (feature.properties['NAMOBJ'] !== null ? autolinker.link(String(feature.properties['NAMOBJ']).replace(/'/g, '\'').toLocaleString()) : 'Malendeng') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMKD'] !== null ? autolinker.link(String(feature.properties['WADMKD']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMKC'] !== null ? autolinker.link(String(feature.properties['WADMKC']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['WADMKK'] !== null ? autolinker.link(String(feature.properties['WADMKK']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_MALENDENG_2_0() {
            return {
                pane: 'pane_MALENDENG_2',
                opacity: 1,
                color: 'rgba(255,105,180,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0,
                fill: true,
                fillOpacity: 0.7,
                fillColor: 'rgba(255,182,193,0.7)',
                interactive: true,
            }
        }

        map.createPane('pane_MALENDENG_2');
        map.getPane('pane_MALENDENG_2').style.zIndex = 402;
        map.getPane('pane_MALENDENG_2').style['mix-blend-mode'] = 'normal';

        var layer_MALENDENG_2 = new L.geoJson(json_MALENDENG_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_MALENDENG_2',
            layerName: 'layer_MALENDENG_2',
            pane: 'pane_MALENDENG_2',
            onEachFeature: pop_MALENDENG_2,
            style: style_MALENDENG_2_0,
        });
        bounds_group.addLayer(layer_MALENDENG_2);
        map.addLayer(layer_MALENDENG_2);

        setBounds();
        </script>
    </body>
</html>
